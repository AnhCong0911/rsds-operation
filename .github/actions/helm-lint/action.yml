name: Helm Lint
description: Lint all Helm charts in the repository
runs:
  using: composite
  steps:
    - uses: azure/setup-helm@v4
    - shell: bash
      run: |
        find helm -name Chart.yaml -exec dirname {} \; | while read -r chart; do
          echo "Linting $chart"
          helm lint "$chart" || exit 1
        done
