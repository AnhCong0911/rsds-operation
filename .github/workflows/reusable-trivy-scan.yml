name: Reusable Trivy Scan

on:
  workflow_call:
    inputs:
      scan-ref:
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan-ref }}
          severity: CRITICAL,HIGH
