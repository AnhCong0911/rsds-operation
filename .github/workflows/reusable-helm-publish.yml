name: Reusable Helm Publish

on:
  workflow_call:
    inputs:
      chart-path:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm package ${{ inputs.chart-path }}
      - run: echo "Push chart artifact to OCI registry"
