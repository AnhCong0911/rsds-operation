apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rsds-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rsds/rsds-frontend
    targetRevision: main
    path: deploy/helm/rsds-frontend
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: rsds
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
